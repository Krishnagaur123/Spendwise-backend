spring.application.name=Spendwise

# ─── Database ────────────────────────────────────────────────────────────────
# Falls back to H2 in-memory when environment variables are not set.
# Override for MySQL: set DEV_DB_URL, DEV_DB_USERNAME, DEV_DB_PASSWORD, DEV_DB_DRIVER
spring.datasource.url=${DEV_DB_URL:jdbc:h2:mem:spendwisedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DEV_DB_USERNAME:sa}
spring.datasource.password=${DEV_DB_PASSWORD:}
spring.datasource.driver-class-name=${DEV_DB_DRIVER:org.h2.Driver}

# H2 web console — useful for inspecting data during local dev
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${DEV_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Must be at least 256 bits. Always override via JWT_SECRET env var in production.
jwt.secret=${JWT_SECRET:spendwise-default-secret-key-for-local-dev-min-256-bits}

# ─── App URLs ────────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.activation.url=${ACTIVATION_URL:http://localhost:8080}

# ─── Mail (optional) ─────────────────────────────────────────────────────────
# App starts and runs without mail configured. Only daily notification jobs will fail silently.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Server ──────────────────────────────────────────────────────────────────
# All endpoints are served under /api/v1.0 — do not change without updating the frontend.
server.servlet.context-path=/api/v1.0

# ─── Session cookie ──────────────────────────────────────────────────────────
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
# SameSite=None is required for cross-origin cookie support (frontend :3000 → backend :8080).
# SameSite=None requires Secure=true in production (HTTPS).
server.servlet.session.cookie.same-site=none

# ─── 404 handling ────────────────────────────────────────────────────────────
# Routes NoHandlerFoundException to GlobalExceptionHandler instead of the default Spring whitepage.
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.profiles.active=dev
