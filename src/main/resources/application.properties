spring.application.name=Spendwise

# Use environment variables for DB connection (falls back to H2 if not set)
spring.datasource.url=${DEV_DB_URL:jdbc:h2:mem:spendwisedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DEV_DB_USERNAME:sa}
spring.datasource.password=${DEV_DB_PASSWORD:}
spring.datasource.driver-class-name=${DEV_DB_DRIVER:org.h2.Driver}

# H2 Console (enabled when using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${DEV_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# JWT secret
jwt.secret=${JWT_SECRET:spendwise-default-secret-key-for-local-dev-min-256-bits}

# App URLs
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.activation.url=${ACTIVATION_URL:http://localhost:8080}

# Mail configuration (optional - app runs without it)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Path - DO NOT globally change from /api/v1.0
server.servlet.context-path=/api/v1.0

# Session config
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
# SameSite=None required for cross-origin cookie support (frontend :3000 → backend :8080)
# Note: SameSite=None requires Secure=true in production (HTTPS)
server.servlet.session.cookie.same-site=none

# Allow NoHandlerFoundException to reach GlobalExceptionHandler for proper 404 responses
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Active profile
spring.profiles.active=dev

